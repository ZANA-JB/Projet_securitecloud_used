name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan secrets (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Audit Python deps
        working-directory: backend
        run: |
          uv tool run pip-audit --strict

  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: '3.11'
      - name: Lint
        working-directory: backend
        run: |
          uv sync
          uv run ruff check .
      - name: Tests
        working-directory: backend
        run: uv run pytest -q

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        env:
          VITE_API_URL: /api
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: |
          npm ci || npm install
          npm run build

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier les secrets DockerHub
        id: dockerhub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "push=false" >> $GITHUB_OUTPUT
            echo "backend_tag=projet-cloud-backend:ci" >> $GITHUB_OUTPUT
            echo "frontend_tag=projet-cloud-frontend:ci" >> $GITHUB_OUTPUT
            echo "::notice::Build uniquement sur pull request. Le push DockerHub est réservé aux pushes sur main."
          elif [ -z "$DH_USER" ] || [ -z "$DH_TOKEN" ]; then
            echo "push=false" >> $GITHUB_OUTPUT
            echo "backend_tag=projet-cloud-backend:ci" >> $GITHUB_OUTPUT
            echo "frontend_tag=projet-cloud-frontend:ci" >> $GITHUB_OUTPUT
            echo "::warning::Build uniquement (pas de push). Configurer DOCKERHUB_USERNAME et DOCKERHUB_TOKEN dans Settings > Secrets pour activer le push DockerHub."
          else
            echo "push=true" >> $GITHUB_OUTPUT
            echo "backend_tag=${DH_USER}/projet-cloud-backend:latest" >> $GITHUB_OUTPUT
            echo "frontend_tag=${DH_USER}/projet-cloud-frontend:latest" >> $GITHUB_OUTPUT
          fi

      - name: Login to DockerHub
        if: steps.dockerhub.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend (et push si secrets dispo)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ steps.dockerhub.outputs.push == 'true' }}
          load: ${{ steps.dockerhub.outputs.push != 'true' }}
          tags: ${{ steps.dockerhub.outputs.backend_tag }}

      - name: Build frontend (et push si secrets dispo)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ steps.dockerhub.outputs.push == 'true' }}
          load: ${{ steps.dockerhub.outputs.push != 'true' }}
          build-args: |
            VITE_API_URL=/api
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          tags: ${{ steps.dockerhub.outputs.frontend_tag }}

      # Trivy : on liste toutes les CVE HIGH/CRITICAL pour info, sans bloquer.
      - name: Scan informatif (HIGH + CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.dockerhub.outputs.backend_tag }}
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

      # Et on bloque seulement sur CRITICAL non corrigée.
      # Pour durcir : ajouter HIGH dans severity ci-dessous.
      - name: Trivy bloquant (CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.dockerhub.outputs.backend_tag }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  push-ecr:
    name: Push images to AWS ECR
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier la config AWS ECR
        id: ecr-config
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "push=false" >> $GITHUB_OUTPUT
            echo "::notice::ECR désactivé. Configurer AWS_ROLE_TO_ASSUME pour activer le push ECR."
          else
            echo "push=true" >> $GITHUB_OUTPUT
          fi

      - name: Configurer les identifiants AWS via OIDC
        if: steps.ecr-config.outputs.push == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Créer les repositories ECR si besoin
        if: steps.ecr-config.outputs.push == 'true'
        run: |
          aws ecr describe-repositories --repository-names projet-cloud-backend --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name projet-cloud-backend --region "$AWS_REGION" >/dev/null
          aws ecr describe-repositories --repository-names projet-cloud-frontend --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name projet-cloud-frontend --region "$AWS_REGION" >/dev/null

      - name: Login to Amazon ECR
        if: steps.ecr-config.outputs.push == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend et push ECR
        if: steps.ecr-config.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/projet-cloud-backend:latest

      - name: Build frontend et push ECR
        if: steps.ecr-config.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=/api
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          tags: ${{ steps.login-ecr.outputs.registry }}/projet-cloud-frontend:latest
