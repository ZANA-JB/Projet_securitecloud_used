name: Push images to AWS ECR

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  ECR_BACKEND_REPO: ${{ vars.ECR_BACKEND_REPO || 'projet-cloud-backend' }}
  ECR_FRONTEND_REPO: ${{ vars.ECR_FRONTEND_REPO || 'projet-cloud-frontend' }}

jobs:
  push-ecr:
    name: Push images to AWS ECR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verifier la config AWS ECR
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "::error::Le secret AWS_ROLE_TO_ASSUME n est pas configure. Allez dans Settings > Secrets and variables > Actions et ajoutez-le."
            exit 1
          fi
      - name: Configurer les identifiants AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Creer les repositories ECR si besoin
        run: |
          aws ecr describe-repositories --repository-names "$ECR_BACKEND_REPO" --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_BACKEND_REPO" --region "$AWS_REGION" >/dev/null
          aws ecr describe-repositories --repository-names "$ECR_FRONTEND_REPO" --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_FRONTEND_REPO" --region "$AWS_REGION" >/dev/null
      - name: Login to Amazon ECR
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$REGISTRY"
          echo "REGISTRY=$REGISTRY" >> "$GITHUB_ENV"
      - name: Build backend et push ECR
        run: |
          docker build -t "$REGISTRY/$ECR_BACKEND_REPO:latest" ./backend
          docker push "$REGISTRY/$ECR_BACKEND_REPO:latest"
      - name: Build frontend et push ECR
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            --build-arg VITE_GOOGLE_CLIENT_ID="${{ vars.VITE_GOOGLE_CLIENT_ID }}" \
            -t "$REGISTRY/$ECR_FRONTEND_REPO:latest" \
            ./frontend
          docker push "$REGISTRY/$ECR_FRONTEND_REPO:latest"