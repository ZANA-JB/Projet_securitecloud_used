name: CI/CD

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read
  id-token: write

jobs:
  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan secrets (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Audit Python deps
        working-directory: backend
        run: uv tool run pip-audit --strict

  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: '3.11'
      - name: Lint
        working-directory: backend
        run: |
          uv sync
          uv run ruff check .
      - name: Tests
        working-directory: backend
        run: uv run pytest -q

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        env:
          VITE_API_URL: /api
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: |
          npm ci || npm install
          npm run build

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Verifier les secrets DockerHub
        id: dockerhub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" != "push" ] || { [ "${{ github.ref }}" != "refs/heads/main" ] && [ "${{ github.ref }}" != "refs/heads/dev" ]; }; then
            echo "push=false" >> $GITHUB_OUTPUT
            echo "backend_tag=eduscore-backend:ci" >> $GITHUB_OUTPUT
            echo "frontend_tag=eduscore-frontend:ci" >> $GITHUB_OUTPUT
          elif [ -z "$DH_USER" ] || [ -z "$DH_TOKEN" ]; then
            echo "push=false" >> $GITHUB_OUTPUT
            echo "backend_tag=eduscore-backend:ci" >> $GITHUB_OUTPUT
            echo "frontend_tag=eduscore-frontend:ci" >> $GITHUB_OUTPUT
            echo "::warning::Configurer DOCKERHUB_USERNAME et DOCKERHUB_TOKEN dans Settings > Secrets."
          else
            echo "push=true" >> $GITHUB_OUTPUT
            echo "backend_tag=${DH_USER}/eduscore-backend:latest" >> $GITHUB_OUTPUT
            echo "frontend_tag=${DH_USER}/eduscore-frontend:latest" >> $GITHUB_OUTPUT
          fi
      - name: Login to DockerHub
        if: steps.dockerhub.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build backend (et push si secrets dispo)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ steps.dockerhub.outputs.push == 'true' }}
          load: ${{ steps.dockerhub.outputs.push != 'true' }}
          tags: ${{ steps.dockerhub.outputs.backend_tag }}
      - name: Build frontend (et push si secrets dispo)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ steps.dockerhub.outputs.push == 'true' }}
          load: ${{ steps.dockerhub.outputs.push != 'true' }}
          build-args: |
            VITE_API_URL=/api
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          tags: ${{ steps.dockerhub.outputs.frontend_tag }}
      - name: Scan informatif (HIGH + CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.dockerhub.outputs.backend_tag }}
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true
      - name: Trivy bloquant (CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.dockerhub.outputs.backend_tag }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  push-ecr:
    name: Push images to AWS ECR
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
    steps:
      - uses: actions/checkout@v4
      - name: Verifier la config AWS ECR
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "::error::Le secret AWS_ROLE_TO_ASSUME n est pas configure. Allez dans Settings > Secrets and variables > Actions et ajoutez-le."
            exit 1
          fi
      - name: Configurer les identifiants AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Creer les repositories ECR si besoin
        run: |
          aws ecr describe-repositories --repository-names eduscore-backend --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name eduscore-backend --region "$AWS_REGION" >/dev/null
          aws ecr describe-repositories --repository-names eduscore-frontend --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name eduscore-frontend --region "$AWS_REGION" >/dev/null
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build backend et push ECR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/eduscore-backend:latest
      - name: Build frontend et push ECR
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=/api
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          tags: ${{ steps.login-ecr.outputs.registry }}/eduscore-frontend:latest